<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transformer Code Quiz - iPhone</title>
  <style>
:root {
  --bg: #f4f6f8;
  --ink: #17202a;
  --muted: #5f6b78;
  --line: #d8dee6;
  --panel: #ffffff;
  --accent: #2563eb;
  --accent-soft: #e8f0ff;
  --good: #117a45;
  --good-bg: #e7f6ee;
  --bad: #b42318;
  --bad-bg: #fde8e5;
  --warn: #8a5a00;
  --warn-bg: #fff4d7;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: Arial, Helvetica, sans-serif;
  -webkit-text-size-adjust: 100%;
}

.app-shell {
  width: min(1060px, calc(100vw - 32px));
  margin: 24px auto;
  padding-bottom: env(safe-area-inset-bottom);
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 14px;
}

h1, h2, p {
  margin-top: 0;
}

h1 {
  font-size: 28px;
  margin-bottom: 4px;
}

.topbar p {
  color: var(--muted);
  margin-bottom: 0;
}

.scorebox {
  min-width: 130px;
  border: 1px solid var(--line);
  background: var(--panel);
  border-radius: 8px;
  padding: 12px 16px;
  text-align: right;
}

.scorebox span {
  display: block;
  font-size: 24px;
  font-weight: 700;
}

.scorebox small {
  color: var(--muted);
}

.controls, .nav-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
}

button {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  font-size: 15px;
  font-weight: 600;
  min-height: 42px;
  padding: 0 14px;
  cursor: pointer;
  touch-action: manipulation;
}

button:hover {
  border-color: var(--accent);
}

button.primary, #startBtn, #nextBtn {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
}

.hidden {
  display: none;
}

.progress-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  color: var(--muted);
  font-weight: 600;
}

.pill {
  border-radius: 999px;
  border: 1px solid var(--line);
  padding: 5px 10px;
  background: #f8fafc;
}

.pill.correct {
  color: var(--good);
  background: var(--good-bg);
  border-color: #b8e4ca;
}

.pill.incorrect {
  color: var(--bad);
  background: var(--bad-bg);
  border-color: #f2bab5;
}

.progress-track {
  height: 8px;
  border-radius: 999px;
  background: #e7ecf2;
  overflow: hidden;
  margin-bottom: 18px;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: var(--accent);
}

.question-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
}

.question-card h2 {
  font-size: 18px;
  margin-bottom: 10px;
}

#questionText {
  font-size: 18px;
  line-height: 1.45;
}

.answer-area {
  display: grid;
  gap: 10px;
  margin-top: 14px;
}

.choice {
  width: 100%;
  text-align: left;
  min-height: 44px;
  white-space: normal;
}

.choice.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.choice.correct {
  border-color: var(--good);
  background: var(--good-bg);
}

.choice.incorrect {
  border-color: var(--bad);
  background: var(--bad-bg);
}

.text-answer {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.text-answer input {
  flex: 1 1 240px;
  min-height: 44px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 17px;
  padding: 0 12px;
}

.feedback {
  margin-top: 14px;
  min-height: 24px;
  font-weight: 700;
}

.feedback.correct {
  color: var(--good);
}

.feedback.incorrect {
  color: var(--bad);
}

.feedback.pending {
  color: var(--warn);
}

.diagram-area {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 1fr));
  gap: 12px;
  margin: 14px 0;
}

.diagram-area img {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: white;
}

.review-content {
  display: grid;
  gap: 14px;
}

.attempt {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
}

.attempt h3 {
  margin: 0 0 8px;
  font-size: 17px;
}

.miss-list {
  margin: 8px 0 0;
  padding-left: 20px;
}

@media (max-width: 720px) {
  body {
    background: var(--panel);
  }

  .app-shell {
    width: 100%;
    margin: 0;
  }

  .topbar {
    align-items: stretch;
    flex-direction: column;
    padding: 14px;
    margin-bottom: 0;
  }

  h1 {
    font-size: 23px;
  }

  .topbar p {
    font-size: 14px;
  }

  .scorebox {
    text-align: left;
  }

  .controls {
    padding: 0 14px 14px;
    margin-bottom: 0;
  }

  .controls button {
    flex: 1 1 100%;
  }

  .panel {
    border-left: 0;
    border-right: 0;
    border-radius: 0;
    padding: 14px;
  }

  .question-card {
    padding: 14px;
  }

  #questionText {
    font-size: 16px;
  }

  .choice {
    font-size: 15px;
    line-height: 1.25;
    padding-top: 10px;
    padding-bottom: 10px;
  }

  .text-answer {
    display: grid;
    grid-template-columns: 1fr;
  }

  .text-answer input {
    width: 100%;
    font-size: 16px;
  }

  .nav-row {
    position: sticky;
    bottom: 0;
    background: rgba(255,255,255,0.96);
    border-top: 1px solid var(--line);
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    margin: 0 -14px -14px;
  }

  .nav-row button {
    flex: 1 1 calc(50% - 8px);
  }

  #finishBtn {
    flex-basis: 100%;
  }

  .diagram-area {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 390px) {
  .progress-row {
    align-items: flex-start;
    flex-direction: column;
  }

  button {
    font-size: 14px;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <section class="topbar">
      <div>
        <h1>Transformer Code Quiz</h1>
        <p>25 questions with instant feedback and saved review history.</p>
      </div>
      <div class="scorebox" aria-live="polite">
        <span id="scoreText">0 / 0</span>
        <small id="percentText">0%</small>
      </div>
    </section>

    <section class="controls">
      <button id="startBtn" type="button">Start New Attempt</button>
      <button id="reviewBtn" type="button">Review Saved Attempts</button>
      <button id="resetBtn" type="button">Clear Saved History</button>
    </section>

    <section id="quizPanel" class="panel">
      <div class="progress-row">
        <div id="questionCounter">Question 1 of 25</div>
        <div id="statusPill" class="pill">Not answered</div>
      </div>
      <div class="progress-track"><div id="progressFill"></div></div>

      <article class="question-card">
        <h2 id="questionTitle"></h2>
        <p id="questionText"></p>
        <div id="diagramArea" class="diagram-area"></div>
        <div id="answerArea" class="answer-area"></div>
        <div id="feedback" class="feedback"></div>
      </article>

      <div class="nav-row">
        <button id="prevBtn" type="button">Previous</button>
        <button id="nextBtn" type="button">Next</button>
        <button id="finishBtn" type="button">Finish Attempt</button>
      </div>
    </section>

    <section id="reviewPanel" class="panel hidden">
      <h2>Saved Review</h2>
      <div id="reviewContent" class="review-content"></div>
    </section>
  </main>

  <script>
const quiz = [

    answer: "b",

  {
    id: 2,
    question: "When using fuses to provide primary-only protection, what is the maximum size overcurrent protective device permitted to protect a 750VA, 480V primary, 48V secondary, single-phase transformer?",

  },
  {
    id: 3,

  {
    id: 4,
    question: "What minimum size THWN-2 copper secondary conductors are permitted for a 112.5kVA, 3-phase, 240V primary and a 480Y/277V secondary pad-mounted transformer set outside of a second building when the secondary conductors terminate in a single 3-pole circuit breaker rated 150 amperes?",

const state = {
  index: 0,
  responses: {},
  startedAt: new Date().toISOString()
};

const els = {
  scoreText: document.getElementById("scoreText"),
  percentText: document.getElementById("percentText"),
  questionCounter: document.getElementById("questionCounter"),
  statusPill: document.getElementById("statusPill"),
  progressFill: document.getElementById("progressFill"),
  questionTitle: document.getElementById("questionTitle"),
  questionText: document.getElementById("questionText"),
  diagramArea: document.getElementById("diagramArea"),
  answerArea: document.getElementById("answerArea"),
  feedback: document.getElementById("feedback"),
  prevBtn: document.getElementById("prevBtn"),
  nextBtn: document.getElementById("nextBtn"),
  finishBtn: document.getElementById("finishBtn"),
  startBtn: document.getElementById("startBtn"),
  reviewBtn: document.getElementById("reviewBtn"),
  resetBtn: document.getElementById("resetBtn"),
  quizPanel: document.getElementById("quizPanel"),
  reviewPanel: document.getElementById("reviewPanel"),
  reviewContent: document.getElementById("reviewContent")
};

function wireChoices() {
  return [
    "a. 10 AWG", "b. 8 AWG", "c. 6 AWG", "d. 4 AWG", "e. 3 AWG", "f. 2 AWG",
    "g. 1 AWG", "h. 1/0 AWG", "i. 2/0 AWG", "j. 3/0 AWG", "k. 4/0 AWG",
    "l. 250 kcmil", "m. 300 kcmil", "n. 350 kcmil", "o. 400 kcmil",
    "p. 500 kcmil", "q. 600 kcmil", "r. 700 kcmil", "s. 750 kcmil",
    "t. 800 kcmil", "u. 900 kcmil", "v. 1,000 kcmil"
  ];
}

function normalize(value) {
  return String(value || "")
    .toLowerCase()
    .replace(/amps?/g, "a")
    .replace(/amperes?/g, "a")
    .replace(/\s+/g, "")
    .replace(/\.0+$/g, "")
    .replace(/[^a-z0-9/%.-]/g, "");
}

function numericValue(value) {
  const match = String(value || "").match(/-?\d+(?:\.\d+)?/);
  return match ? Number(match[0]) : null;
}

function numericEquivalent(expected, actual) {
  const expectedNumber = numericValue(expected);
  const actualNumber = numericValue(actual);
  if (expectedNumber === null || actualNumber === null) return false;
  return Math.abs(expectedNumber - actualNumber) < 0.01;
}

function answerLetter(value) {
  const match = String(value || "").trim().toLowerCase().match(/^([a-v])/);
  return match ? match[1] : "";
}

function isCorrect(question, value) {
  if (question.choices) {
    return answerLetter(value) === question.answer;
  }
  return normalize(value) === normalize(question.answer) || numericEquivalent(question.answer, value);
}

function recordAnswer(value) {
  const question = quiz[state.index];
  const correct = isCorrect(question, value);
  state.responses[question.id] = {
    value,
    correct,
    answeredAt: new Date().toISOString()
  };
  render();
}

function render() {
  const question = quiz[state.index];
  const response = state.responses[question.id];

  els.questionCounter.textContent = `Question ${state.index + 1} of ${quiz.length}`;
  els.questionTitle.textContent = `Question ${question.id}`;
  els.questionText.textContent = question.question;
  els.progressFill.style.width = `${((state.index + 1) / quiz.length) * 100}%`;

  renderDiagrams(question);
  renderAnswerArea(question, response);
  renderFeedback(question, response);
  renderScore();

  els.prevBtn.disabled = state.index === 0;
  els.nextBtn.disabled = state.index === quiz.length - 1;
}

function renderDiagrams(question) {
  els.diagramArea.innerHTML = "";
  if (!question.diagrams) return;

  question.diagrams.forEach((src) => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = "Question 15 diagram choices";
    els.diagramArea.appendChild(img);
  });
}

function renderAnswerArea(question, response) {
  els.answerArea.innerHTML = "";

  if (question.choices) {
    question.choices.forEach((choice) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "choice";
      button.textContent = choice;
      const letter = answerLetter(choice);

      if (response) {
        if (letter === question.answer) button.classList.add("correct");
        if (letter === answerLetter(response.value) && !response.correct) button.classList.add("incorrect");
        if (letter === answerLetter(response.value)) button.classList.add("selected");
      }

      button.addEventListener("click", () => recordAnswer(choice));
      els.answerArea.appendChild(button);
    });
    return;
  }

  const wrapper = document.createElement("div");
  wrapper.className = "text-answer";
  const input = document.createElement("input");
  input.type = "text";
  input.placeholder = "Type your answer, like 175 A";
  input.value = response?.value || "";
  const check = document.createElement("button");
  check.type = "button";
  check.textContent = "Check Answer";
  check.className = "primary";

  check.addEventListener("click", () => recordAnswer(input.value));
  input.addEventListener("keydown", (event) => {
    if (event.key === "Enter") recordAnswer(input.value);
  });

  wrapper.append(input, check);
  els.answerArea.appendChild(wrapper);
}

function renderFeedback(question, response) {
  els.feedback.className = "feedback";
  els.statusPill.className = "pill";

  if (!response) {
    els.feedback.textContent = "Answer to get instant feedback.";
    els.feedback.classList.add("pending");
    els.statusPill.textContent = "Not answered";
    return;
  }

  if (response.correct) {
    els.feedback.textContent = `Correct. Source: ${question.source}.`;
    els.feedback.classList.add("correct");
    els.statusPill.textContent = "Correct";
    els.statusPill.classList.add("correct");
  } else {
    els.feedback.textContent = `Not quite. Correct answer: ${question.answer}. Source: ${question.source}.`;
    els.feedback.classList.add("incorrect");
    els.statusPill.textContent = "Incorrect";
    els.statusPill.classList.add("incorrect");
  }
}

function renderScore() {
  const answered = Object.values(state.responses);
  const correct = answered.filter((item) => item.correct).length;
  const percent = Math.round((correct / quiz.length) * 100);
  els.scoreText.textContent = `${correct} / ${quiz.length}`;
  els.percentText.textContent = `${percent}% overall, ${answered.length}/${quiz.length} answered`;
}

function saveAttempt() {
  const attempts = getAttempts();
  const answered = Object.values(state.responses);
  const correct = answered.filter((item) => item.correct).length;
  const attempt = {
    id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}`,
    startedAt: state.startedAt,
    finishedAt: new Date().toISOString(),
    correct,
    answered: answered.length,
    total: quiz.length,
    responses: state.responses
  };
  attempts.unshift(attempt);
  localStorage.setItem("transformerQuizAttempts", JSON.stringify(attempts.slice(0, 25)));
  alert(`Attempt saved: ${correct} correct out of ${quiz.length} total questions.`);
  renderReview();
}

function getAttempts() {
  try {
    return JSON.parse(localStorage.getItem("transformerQuizAttempts") || "[]");
  } catch {
    return [];
  }
}

function renderReview() {
  const attempts = getAttempts();
  els.reviewContent.innerHTML = "";
  if (!attempts.length) {
    els.reviewContent.textContent = "No saved attempts yet.";
    return;
  }

  attempts.forEach((attempt, index) => {
    const card = document.createElement("div");
    card.className = "attempt";
    const date = new Date(attempt.finishedAt).toLocaleString();
    const percent = Math.round((attempt.correct / attempt.total) * 100);
    const missed = quiz.filter((q) => attempt.responses[q.id] && !attempt.responses[q.id].correct);

    const title = document.createElement("h3");
    title.textContent = `Attempt ${attempts.length - index}: ${attempt.correct}/${attempt.total} correct (${percent}%), ${attempt.answered}/${attempt.total} answered`;
    const meta = document.createElement("p");
    meta.textContent = `Saved ${date}.`;
    card.append(title, meta);

    if (missed.length) {
      const list = document.createElement("ol");
      list.className = "miss-list";
      missed.forEach((q) => {
        const li = document.createElement("li");
        const given = attempt.responses[q.id].value || "blank";
        li.textContent = `Question ${q.id}: you answered "${given}". Correct: ${q.answer}.`;
        list.appendChild(li);
      });
      card.appendChild(list);
    } else {
      const perfect = document.createElement("p");
      perfect.textContent = "No missed questions in this saved attempt.";
      card.appendChild(perfect);
    }
    els.reviewContent.appendChild(card);
  });
}

function startNewAttempt() {
  state.index = 0;
  state.responses = {};
  state.startedAt = new Date().toISOString();
  els.quizPanel.classList.remove("hidden");
  els.reviewPanel.classList.add("hidden");
  render();
}

els.prevBtn.addEventListener("click", () => {
  state.index = Math.max(0, state.index - 1);
  render();
});

els.nextBtn.addEventListener("click", () => {
  state.index = Math.min(quiz.length - 1, state.index + 1);
  render();
});

els.finishBtn.addEventListener("click", saveAttempt);
els.startBtn.addEventListener("click", startNewAttempt);
els.reviewBtn.addEventListener("click", () => {
  els.reviewPanel.classList.toggle("hidden");
  renderReview();
});
els.resetBtn.addEventListener("click", () => {
  if (confirm("Clear all saved quiz attempts?")) {
    localStorage.removeItem("transformerQuizAttempts");
    renderReview();
  }
});

render();

</script>
</body>
</html>
